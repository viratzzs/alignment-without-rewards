dependencies = [
    "dataset>=1.6.2",
    "datasets==4.4.1",
    "loguru>=0.7.3",
    "pandas>=3.0.1",
    "numpy==2.2.6",
    "pyngrok>=7.5.1",
    "python-dotenv>=1.2.2",
    "requests>=2.32.5",
