    "torchvision==0.24.1+d801a34",
    "triton==3.4.0",
    "transformers==4.57.6",
    "huggingface-hub==0.36.2",
    # ─────────────────────────────────────────────────────────────────────
    "trl>=0.29.1",
    "wandb==0.25.1",
    "torchdata>=0.11.0",
    "sglang>=0.5.2",
    "sglang-router>=0.3.2",
    "ring-flash-attn>=0.1.8",
